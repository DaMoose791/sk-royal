<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK-Royal OY</title>
    <style>
        /* Grundinställningar för alla skärmar */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* Responsiv container (kortet i mitten) */
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 85%;
        }
        h1 {
            margin-bottom: 10px;
            color: #111;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }
        /* Knappar/Länkar anpassade för touchskärmar */
        .btn {
            display: block;
            background-color: #0070f3;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0051b3;
        }
        .secondary {
            background-color: #eaeaea;
            color: #444;
        }
        .secondary:hover {
            background-color: #dddddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Välkommen!</h1>
        <p>Det här är min hemsida. Den är helt gratis, laddar supersnabbt och fungerar perfekt på både mobiler och datorer.</p>
        
        <!-- Ändra länkarna nedan till dina egna profiler/sidor -->
        <a href="mailto:din.epost@example.com" class="btn">Kontakta mig</a>
        <a href="https://linkedin.com" target="_blank" class="btn secondary">LinkedIn</a>
    </div>

</body>
</html>
